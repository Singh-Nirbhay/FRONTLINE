name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: frontline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/frontline_test?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/frontline_test?schema=public
      REDIS_URL: redis://localhost:6379
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.3-70b
      CONFIDENCE_THRESHOLD: 0.72
      MAX_RETRIES: 3
      CONCURRENCY: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run TypeScript Check
        run: pnpm --filter "*" exec tsc --noEmit

      - name: Run Vitest Suite (Unit + Integration)
        run: pnpm exec vitest run --coverage

      - name: Build Workspace
        run: pnpm build

      - name: Run Evaluation Harness
        run: pnpm eval
